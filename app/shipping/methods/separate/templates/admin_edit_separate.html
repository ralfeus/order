{% extends "base.html" %}

{% block scripts %}
{{ super() }}
<script src="static/js/admin_edit_separate.js"></script>
{% endblock %}

{% block content %}
{{ super() }}
<h1>{{ shipping.name }}</h1>
<form id="separate-form">
    <div class="mb-4" style="max-width: 600px;">
        <label class="form-label fw-semibold">Available countries</label>
        <div class="form-text mb-2">
            This shipping method will only appear at checkout for the selected countries.
        </div>
        <div id="country-list" class="border rounded p-3" style="max-height: 360px; overflow-y: auto;">
            <span class="text-muted">Loading countries…</span>
        </div>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
    <button type="button" id="cancel-btn" class="btn btn-secondary ms-2">Cancel</button>
</form>
<input type="hidden" id="shipping_id" value="{{ shipping.id }}" />
{% endblock %}
