networks:
  order:
    name: order

volumes:
  builder-output:

services:
  # neo4j:
  #   image: neo4j:4.4.2
  #   ports:
  #     - 7474:7474
  #     - 7687:7687
  #   volumes:
  #     - /var/lib/neo4j/conf:/conf
  #     - /var/lib/neo4j/data:/data
  #     - /var/lib/neo4j/logs:/logs
  #     - /var/lib/neo4j/plugins:/plugins
  #   environment:
  #     - NEO4J_dbms_default__advertised__address=neo4j
  #   networks:
  #     - order

  network-manager:
    # depends_on:
    #   - neo4j
    image: ralfeus/network-manager:stable
    ports:
      - 5001:5001
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /Users/ralfeus/Projects/order/.claude/worktrees/browserless/network_builder/config.json:/app/config.json
      - builder-output:/app/output
    environment:
      - NEO4J_URL=bolt://neo4j:1@neo4j:7687
      - SOCKS5_PROXY=host.docker.internal:9050
      - BUILDER_IMAGE=ralfeus/network-builder:stable
      - BUILDER_NETWORK=order
    privileged: true
    networks:
      - order

  # network-builder is a one-shot job container started on demand by network-manager
  # or manually: docker run --network order -e NEO4J_URL=bolt://neo4j:1@neo4j:7687 \
  #                ralfeus/network-builder:stable --user S5832131 --password ... --root S5832131
  network-builder:
    # depends_on:
    #   - neo4j
    image: ralfeus/network-builder:stable
    profiles:
      - builder
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - builder-output:/app/output
    environment:
      - NEO4J_URL=bolt://neo4j:1@neo4j:7687
      - SOCKS5_PROXY=host.docker.internal:9050
    networks:
      - order

  rabbitmq:
    image: rabbitmq:3-management
    ports:
    - "5672:5672"
    - "15672:15672"
    networks:
      - order

  # metabase:
  #   image: metabase/metabase:latest
  #   ports:
  #     - 3001:3000
  #   volumes:
  #     - /var/lib/metabase/plugins:/plugins
  #   environment:
  #     - MB_SITE_URL=https://request.talya.kim/mb/
  #     - MB_DB_TYPE=mysql
  #     - MB_DB_CONNECTION_URI=jdbc:mysql://172.17.0.1:3306/metabase?user=metabase&password=metabase
  #     - JAVA_TIMEZONE=Asia/Seoul
  #   networks:
  #     - order

  statsd:
    image: statsd/statsd
    volumes:
      - ./statsd/config.js:/usr/src/app/config.js:ro
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - order

  order-master:
    build:
      context: .
      dockerfile: app/Dockerfile
    depends_on:
      - rabbitmq
      - statsd
    ports:
      - 5000:5000
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - /Users/ralfeus/Projects/order/.claude/worktrees/browserless/app/config-default.json:/app/app/config-default.json
    networks:
      - order
    environment:
      - OM_QUEUE_SERVER=rabbitmq
      - CELERY_QUEUE=order

  browser:
    image: mcr.microsoft.com/playwright:v1.58.0-noble
    command: ["npx", "playwright", "run-server", "--port", "3000", "--host", "0.0.0.0"]
    networks:
      - order

  order-master-celery:
    build:
      context: .
      dockerfile: app/Dockerfile
    depends_on:
      - rabbitmq
      - browser
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - /Users/ralfeus/Projects/order/.claude/worktrees/browserless/app/config-default.json:/app/app/config-default.json
    environment:
      - CELERY=1
      - OM_QUEUE_SERVER=rabbitmq
      - CELERY_QUEUE=order
      - BROWSER_URL=ws://browser:3000
    networks:
      - order



#####################################################

  om-2:
    build:
      context: .
      dockerfile: app/Dockerfile
    depends_on:
      - rabbitmq
      - statsd
    ports:
      - 5001:5000
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - /Users/ralfeus/Projects/order/.claude/worktrees/browserless/app/config-default.json:/app/app/config-default.json
    networks:
      - order
    environment:
      - OM_QUEUE_SERVER=rabbitmq
      - CELERY_QUEUE=om-2
  om-celery-2:
    build:
      context: .
      dockerfile: app/Dockerfile
    depends_on:
      - rabbitmq
      - browser
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - /Users/ralfeus/Projects/order/.claude/worktrees/browserless/app/config-default.json:/app/app/config-default.json
    environment:
      - CELERY=1
      - OM_QUEUE_SERVER=rabbitmq
      - CELERY_QUEUE=om-2
      - BROWSER_URL=ws://browser:3000
    networks:
      - order
